# Argo Rollout for the storedog `discounts` (Flask) service, with a canary strategy
# gated by a Datadog Deployment Gate (APM Faulty Deployment Detection).
#
# Converted from k8s-manifests/storedog-app/deployments/discounts.yaml.
# The USTagging labels (tags.datadoghq.com/{service,env,version}) live on the Rollout
# metadata so the analysis step can pass them to datadog-ci via fieldRef.
#
# The gate policy referenced below (`datadog-deployment-gate`) is a cluster-scoped
# `ClusterAnalysisTemplate` defined in rollouts/deployment-gate-cluster-analysis-template.yaml -
# see rollouts/deployment-gates-guide.md for the full writeup.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: discounts
  namespace: storedog
  labels:
    app: store-discounts
    team: discounts
    tags.datadoghq.com/service: store-discounts
    tags.datadoghq.com/env: demo
    tags.datadoghq.com/version: "bad-20260703175111"
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: store-discounts
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 60 } # let APM see the new version under real traffic
        # --- Deployment Gate: APM Faulty Deployment Detection ---
        - analysis:
            templates:
              - templateName: datadog-deployment-gate
                clusterScope: true # datadog-deployment-gate is a ClusterAnalysisTemplate
            args:
              - name: service
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['tags.datadoghq.com/service']
              - name: env
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['tags.datadoghq.com/env']
              - name: version # REQUIRED for faulty_deployment_detection rules
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['tags.datadoghq.com/version']
        - setWeight: 100
  template:
    metadata:
      labels:
        app: store-discounts
        team: discounts
        tags.datadoghq.com/service: store-discounts
        tags.datadoghq.com/env: demo
        tags.datadoghq.com/version: "bad-20260703175111"
      annotations:
        ad.datadoghq.com/discounts.logs: '[{"source": "python"}]'
    spec:
      volumes:
        - name: apmsocketpath
          hostPath:
            path: /var/run/datadog/
      initContainers:
        - name: wait-for-db
          image: busybox:1.37.0
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
        - name: discounts
          # Concrete starting image (this repo is applied directly by ArgoCD - no
          # envsubst at sync time). scripts/rollout-bad.sh / rollout-good.sh rewrite
          # this line (and the version label/env above) and push a commit; ArgoCD
          # syncs the change and Argo Rollouts runs the canary + Deployment Gate.
          image: asia-southeast1-docker.pkg.dev/datadog-ese-sandbox/storedog/discounts:buggy
          # rollout-bad.sh/rollout-good.sh reuse mutable tags (:buggy, :good) across
          # demo runs so an SE can rebuild-and-repush without editing this file's tag
          # string. With the default `IfNotPresent`, a node that already cached an
          # older image under the same tag (e.g. from a previous demo run, or - as
          # found live - a wrong-architecture image built without --platform) would
          # silently keep serving the STALE cached image even after a fresh push,
          # since the tag string in this manifest never changes. `Always` makes the
          # kubelet check the registry digest on every pod start.
          imagePullPolicy: Always
          ports:
            - containerPort: 2814
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: storedog-secrets, key: POSTGRES_PASSWORD }
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef: { name: storedog-config, key: POSTGRES_USER }
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef: { name: storedog-config, key: DB_HOST }
            - name: DD_ENV
              value: demo
            - name: DD_SERVICE
              value: store-discounts
            - name: DD_VERSION
              value: "bad-20260703175111"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "200m" }
          volumeMounts:
            - name: apmsocketpath
              mountPath: /var/run/datadog
---
apiVersion: v1
kind: Service
metadata:
  name: discounts
  namespace: storedog
spec:
  ports:
    - port: 2814
      targetPort: 2814
      name: http
  selector:
    app: store-discounts
