apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-flags-config
  namespace: storedog
  labels:
    app: frontend
    managed-by: storedog
    purpose: feature-flags
    environment: demo
    tier: application
data:
  # Flip `active` to true and commit to demo the ADLC "Deploy" Feature Flags control.
  # See feature-flags/staged-rollout-notes.md.
  featureFlags.config.json: |
    [
      { "id": "1", "name": "dbm", "active": false },
      { "id": "2", "name": "error-tracking", "active": false },
      { "id": "3", "name": "api-errors", "active": false },
      { "id": "4", "name": "product-card-frustration", "active": false }
    ]
