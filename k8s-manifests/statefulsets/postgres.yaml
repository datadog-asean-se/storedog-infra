apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: storedog
spec:
  ports:
    - port: 5432
      name: postgres
  clusterIP: None
  selector:
    app: store-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: storedog
  labels:
    app: store-db
    team: database
    tags.datadoghq.com/service: store-db
    tags.datadoghq.com/version: "15.0"
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: store-db
  template:
    metadata:
      labels:
        app: store-db
        team: database
        tags.datadoghq.com/service: store-db
        tags.datadoghq.com/version: "15.0"
      annotations:
        ad.datadoghq.com/postgres.logs: '[{"source": "postgresql", "auto_multi_line_detection": true}]'
        ad.datadoghq.com/postgres.checks: |
          {
            "postgres": {
            "init_config": {},
            "instances": [{"host":"%%host%%", "port":5432, "username":"datadog", "password":"datadog"}]
            }
          }
    spec:
      # ghcr.io/datadog/storedog/postgres runs as the Alpine `postgres` user
      # (uid=70, gid=70 - verified via `docker run --entrypoint id`), not the
      # Debian postgres image's usual uid/gid 999. Without fsGroup, the
      # postgres-logs PVC mounts owned by root and postgres fails to start with
      # "could not open log file ...: Permission denied".
      securityContext:
        fsGroup: 70
      containers:
        - name: postgres
          image: ghcr.io/datadog/storedog/postgres:latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: storedog-config, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: storedog-secrets, key: POSTGRES_PASSWORD } }
            # GCE PD-backed PersistentVolumes always contain a `lost+found` directory at
            # the mount root, which makes `initdb` refuse to initialize (it requires an
            # empty directory). Point PGDATA at a subdirectory of the mount instead -
            # this is the standard fix documented on the postgres Docker Hub image page.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-logs
              mountPath: /var/log/pg_log
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: postgres-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
